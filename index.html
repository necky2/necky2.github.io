<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tomáš Necuda</title>
  <meta name="description" content="Business and contact details for Tomáš Necuda.">
  <style>
    :root {
      --ink: #1a1c20;
      --muted: #6b7280;
      --line: #e6e3dc;
      --bg: #f5f3ee;
      --card: #ffffff;
      --accent: #3d5a45;
    }

    * { box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      max-width: 440px;
      width: 100%;
      padding: 40px 36px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.03), 0 12px 32px rgba(0,0,0,0.05);
    }

    .name {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 1.7rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin: 0;
    }

    .role {
      color: var(--muted);
      font-size: 0.9rem;
      margin: 4px 0 28px;
    }

    .divider {
      height: 1px;
      background: var(--line);
      border: 0;
      margin: 0 0 24px;
    }

    dl {
      margin: 0;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 12px 20px;
      align-items: baseline;
    }

    dt {
      color: var(--muted);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    dd {
      margin: 0;
      font-size: 0.95rem;
      font-variant-numeric: tabular-nums;
    }

    a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.15s ease;
    }

    a:hover, a:focus-visible {
      border-bottom-color: var(--accent);
      outline: none;
    }

    .foot {
      margin-top: 28px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.78rem;
    }

    @media (max-width: 420px) {
      .card { padding: 32px 24px; }
      dl { grid-template-columns: 1fr; gap: 4px 0; }
      dd { margin-bottom: 12px; }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1 class="name">Tomáš Necuda</h1>
    <p class="role">Sole proprietor</p>
    <hr class="divider">

    <dl>
      <dt>Reg. No.</dt>
      <dd>08840385</dd>

      <dt>VAT ID</dt>
      <dd>CZ9905251609</dd>

      <dt>Contact</dt>
      <dd><a href="mailto:tomas.necuda@necky.me">tomas.necuda@necky.me</a></dd>
    </dl>

    <p class="foot">For business and billing enquiries, please use the contact above.</p>
  </main>
</body>
</html>
